name: 🌍 Paper Worlds Server — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & build
        run: npm ci && npm run build

      - name: Type check
        run: npm run lint

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{"clearCache":"do_not_clear"}'

      - name: Notify Synthia
        run: |
          curl -s -X POST https://synthia-server.onrender.com/api/consciousness/perceive \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"deployment\",\"source\":\"paper_worlds_server\",\"commit\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\"}" || true

      - name: Health check (30s after deploy)
        run: |
          sleep 30
          curl -f https://paper-worlds-server.onrender.com/health || echo "Server warming up..."
